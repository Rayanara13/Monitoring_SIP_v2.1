<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>SIP Monitor — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orb1: #1a3a6e;
    --orb2: #0d2a4a;
    --orb3: #0a1f3a;
    --glass-bg: rgba(8, 18, 40, 0.55);
    --glass-border: rgba(100, 160, 255, 0.12);
    --glass-border-hover: rgba(100, 160, 255, 0.28);
    --text: #e8f0ff;
    --muted: rgba(160, 190, 255, 0.55);
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.35);
    --green: #22c55e;
    --input-bg: rgba(15, 30, 70, 0.6);
    --input-border: rgba(80, 130, 255, 0.15);
    --input-focus: rgba(59, 130, 246, 0.4);
    --error: #ef4444;
    --error-bg: rgba(239, 68, 68, 0.1);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ─── ANIMATED BACKGROUND ─── */
  body {
    background: #030810;
    position: relative;
  }

  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.55;
    animation: drift linear infinite;
  }

  .orb-1 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #1d4ed8 0%, #1e3a8a 40%, transparent 70%);
    top: -200px; left: -150px;
    animation-duration: 25s;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #0e7490 0%, #164e63 40%, transparent 70%);
    bottom: -100px; right: -100px;
    animation-duration: 32s;
    animation-delay: -10s;
  }
  .orb-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #4338ca 0%, #312e81 40%, transparent 70%);
    top: 40%; left: 55%;
    animation-duration: 40s;
    animation-delay: -20s;
  }

  @keyframes drift {
    0%   { transform: translate(0px, 0px) scale(1); }
    25%  { transform: translate(30px, -20px) scale(1.04); }
    50%  { transform: translate(-15px, 35px) scale(0.97); }
    75%  { transform: translate(-30px, -10px) scale(1.02); }
    100% { transform: translate(0px, 0px) scale(1); }
  }

  /* noise overlay */
  .bg-canvas::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
  }

  /* subtle grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* ─── MAIN LAYOUT ─── */
  .page {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ─── GLASS CARD ─── */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 44px 40px 40px;
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04) inset,
      0 32px 64px rgba(0,0,0,.5),
      0 0 80px rgba(59,130,246,.08);
    animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── LOGO / HEADER ─── */
  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
    animation: fade-up 0.6s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .logo-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, rgba(59,130,246,.25), rgba(14,116,144,.15));
    border: 1px solid rgba(59,130,246,.3);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    box-shadow: 0 0 24px rgba(59,130,246,.2), 0 8px 20px rgba(0,0,0,.3);
  }

  .logo-icon svg {
    width: 30px;
    height: 30px;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
    font-family: 'DM Mono', monospace;
  }

  /* ─── FORM ─── */
  .form {
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fade-up 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .field-wrap {
    position: relative;
  }

  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: rgba(100,150,255,.45);
    pointer-events: none;
    transition: color 0.2s;
  }

  .input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
  }

  .input::placeholder {
    color: rgba(120, 160, 255, 0.3);
  }

  .input:focus {
    border-color: var(--input-focus);
    background: rgba(15, 30, 80, 0.75);
    box-shadow: 0 0 0 3px rgba(59,130,246,.12), 0 0 20px rgba(59,130,246,.08);
  }

  .input:focus ~ .field-icon,
  .field-wrap:focus-within .field-icon {
    color: rgba(100,160,255,.8);
  }

  /* ─── ERROR ─── */
  .error-box {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    background: var(--error-bg);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: 12px;
    font-size: 13px;
    color: #fca5a5;
    animation: shake 0.35s cubic-bezier(.36,.07,.19,.97);
  }

  .error-box.visible { display: flex; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ─── SUBMIT BUTTON ─── */
  .btn-submit {
    margin-top: 6px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(37,99,235,.35), 0 0 0 1px rgba(255,255,255,.08) inset;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.12), transparent 60%);
    pointer-events: none;
  }

  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 32px rgba(37,99,235,.5), 0 0 0 1px rgba(255,255,255,.1) inset;
  }

  .btn-submit:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(37,99,235,.3);
  }

  .btn-submit.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .btn-submit .btn-text { transition: opacity 0.2s; }
  .btn-submit .btn-spinner {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
  }

  .btn-submit.loading .btn-text { opacity: 0; }
  .btn-submit.loading .btn-spinner { display: flex; }

  .spinner-ring {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── FOOTER ─── */
  .card-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,.06);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    animation: fade-up 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(34,197,94,.6);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(34,197,94,.6); }
    50% { opacity: 0.6; box-shadow: 0 0 4px rgba(34,197,94,.3); }
  }

  .footer-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── ENTER KEY LINE ─── */
  .enter-hint {
    text-align: center;
    font-size: 12px;
    color: rgba(120,160,255,.3);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    transition: color 0.2s;
  }
  .enter-hint.active { color: rgba(120,160,255,.55); }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>

<div class="page">
  <div class="card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="15" r="6" stroke="#60a5fa" stroke-width="1.5"/>
          <circle cx="15" cy="15" r="11" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
          <circle cx="15" cy="15" r="2.5" fill="#93c5fd"/>
          <path d="M15 4 L15 8" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15 22 L15 26" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M4 15 L8 15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M22 15 L26 15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-title">SIP Monitor</div>
      <div class="logo-sub">Rel 1.0 · Панель мониторинга</div>
    </div>

    <div class="form" id="login-form">
      <div class="field">
        <div class="field-label">Логин</div>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2.5 13.5C2.5 11.015 5.015 9 8 9s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <input class="input" id="username" type="text" placeholder="Введите логин" autocomplete="username" autocapitalize="off">
        </div>
      </div>

      <div class="field">
        <div class="field-label">Пароль</div>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
          </svg>
          <input class="input" id="password" type="password" placeholder="Введите пароль" autocomplete="current-password">
        </div>
      </div>

      <div class="error-box" id="error-box">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="#ef4444" stroke-width="1.2"/>
          <path d="M7 4v3.5" stroke="#ef4444" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="7" cy="10" r="0.7" fill="#ef4444"/>
        </svg>
        <span id="error-text">Неверный логин или пароль</span>
      </div>

      <button class="btn-submit" id="btn-login" onclick="doLogin()">
        <span class="btn-text">Войти</span>
        <span class="btn-spinner"><div class="spinner-ring"></div></span>
      </button>

      <div class="enter-hint" id="enter-hint">Нажмите Enter для входа</div>
    </div>

    <div class="card-footer">
      <div class="status-dot"></div>
      <div class="footer-text">Сервер доступен</div>
    </div>

  </div>
</div>

<script>
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const errorBox   = document.getElementById('error-box');
  const errorText  = document.getElementById('error-text');
  const btn        = document.getElementById('btn-login');
  const hint       = document.getElementById('enter-hint');

  // Enter hint activation
  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('input', () => {
      hint.classList.toggle('active', usernameEl.value.length > 0 && passwordEl.value.length > 0);
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  function showError(msg) {
    errorText.textContent = msg;
    errorBox.classList.remove('visible');
    // force reflow for re-animation
    void errorBox.offsetWidth;
    errorBox.classList.add('visible');
  }

  async function doLogin() {
    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    if (!username || !password) {
      showError('Заполните все поля');
      return;
    }

    btn.classList.add('loading');
    errorBox.classList.remove('visible');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.ok) {
        // success — brief green flash then redirect
        btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';
        btn.querySelector('.btn-text').textContent = 'Вход...';
        btn.classList.remove('loading');
        setTimeout(() => { window.location.href = '/'; }, 300);
      } else {
        btn.classList.remove('loading');
        showError(data.error || 'Неверный логин или пароль');
        passwordEl.value = '';
        passwordEl.focus();
      }
    } catch (e) {
      btn.classList.remove('loading');
      showError('Ошибка соединения с сервером');
    }
  }

  // Focus username on load
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => usernameEl.focus(), 500);
  });
</script>
</body>
</html>
