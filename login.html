<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Вход</title>
<style>
:root{
  --bg:#0b1020;
  --panel:#12192b;
  --text:#e8eefc;
  --muted:#9fb0d3;
  --line:rgba(255,255,255,.08);
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --red:#ef4444;
  --shadow:0 18px 40px rgba(0,0,0,.35);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 600px at 15% -10%, rgba(59,130,246,.18), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(34,197,94,.10), transparent 55%),
    linear-gradient(180deg, #0a0f1f 0%, #0d1326 100%);
}
.card{
  width:min(420px, 100%);
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:28px;
  backdrop-filter: blur(10px);
}
h1{
  margin:0 0 8px 0;
  font-size:30px;
}
.sub{
  color:var(--muted);
  margin-bottom:22px;
  line-height:1.5;
}
.grid{
  display:grid;
  gap:12px;
}
.input{
  width:100%;
  border:none;
  outline:none;
  border-radius:14px;
  padding:14px 15px;
  font-size:15px;
  color:var(--text);
  background:#0f1730;
  border:1px solid rgba(255,255,255,.08);
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 15px;
  font-size:15px;
  font-weight:700;
  color:white;
  cursor:pointer;
  background:linear-gradient(180deg, var(--blue), var(--blue2));
  box-shadow:0 8px 20px rgba(37,99,235,.28);
}
.msg{
  min-height:22px;
  margin-top:14px;
  font-size:14px;
  color:var(--red);
}
.ok{
  color:#86efac;
}
</style>
</head>
<body>
    <div class="card">
    <h1 id="title">Вход в панель</h1>
    <div class="sub" id="sub">Авторизация включена. Введи логин и пароль.</div>

    <div class="grid">
      <input id="username" class="input" placeholder="Логин" autocomplete="username">
      <input id="password" class="input" placeholder="Пароль" type="password" autocomplete="current-password">
      <button class="btn" id="login-btn" onclick="login()">Войти</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

<script>
let isRegisterMode = false;

function toggleMode(){
  isRegisterMode = !isRegisterMode;
  const title = document.getElementById("title");
  const sub = document.getElementById("sub");
  const loginBtn = document.getElementById("login-btn");
  const toggleBtn = document.getElementById("toggle-btn");
  const msg = document.getElementById("msg");
  
  msg.textContent = "";

  if(isRegisterMode){
    title.textContent = "Регистрация";
    sub.textContent = "Введи логин — пароль будет сгенерирован автоматически.";
    loginBtn.textContent = "Зарегистрировать";
    toggleBtn.textContent = "Уже есть аккаунт";
  } else {
    title.textContent = "Вход в панель";
    sub.textContent = "Авторизация включена. Введи логин и пароль.";
    loginBtn.textContent = "Войти";
    toggleBtn.textContent = "Создать аккаунт";
  }
}

async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  msg.textContent = "";
  msg.classList.remove("ok");

  if(!username || !password){
    msg.textContent = "Заполни все поля";
    return;
  }

  const url = isRegisterMode ? "/register" : "/login";

  try{
    const response = await fetch(url, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password})
    });

    const result = await response.json();

    if(!result.ok){
      msg.textContent = result.error || "Ошибка";
      return;
    }

    if(isRegisterMode){
      msg.textContent = "Регистрация успешна! Теперь войди.";
      msg.classList.add("ok");
      toggleMode();
    } else {
      msg.textContent = "Вход выполнен";
      msg.classList.add("ok");
      location.href = "/";
    }
  }catch(e){
    msg.textContent = "Сервер недоступен";
  }
}

document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter"){
    login();
  }
});
</script>
</body>
</html>
